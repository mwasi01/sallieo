<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products | Bazaar & Co. — Home • Style • Footwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #fefaf5;
      color: #161616;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1e1e2a;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.25s ease;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #1e1e2a;
      color: #1e1e2a;
    }
    .btn-outline:hover {
      background: #1e1e2a;
      color: white;
      transform: translateY(-2px);
    }
    .btn-primary {
      background: #e76f51;
    }
    .btn-primary:hover {
      background: #d55b3c;
      transform: translateY(-2px);
    }
    header {
      background: rgba(255,255,245,0.98);
      backdrop-filter: blur(0px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
      position: sticky;
      top: 0;
      z-index: 200;
      border-bottom: 1px solid #f0e3d8;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(125deg, #1e1e2a, #e76f51);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: #2c2c3a;
      transition: 0.2s;
      font-size: 0.95rem;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #e76f51;
    }
    .page-header {
      background: linear-gradient(120deg, #fff5eb 0%, #feeedf 100%);
      padding: 50px 0 40px;
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .page-header p {
      color: #4a4a5a;
      margin-top: 12px;
    }
    .filters-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .filter-btn {
      background: white;
      border: 1px solid #e0d6cc;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #e76f51;
      border-color: #e76f51;
      color: white;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 36px;
      margin: 48px 0 60px;
    }
    .product-card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
      transition: all 0.35s cubic-bezier(0.2, 0, 0, 1);
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.03);
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 45px -12px rgba(0,0,0,0.15);
    }
    .card-img {
      width: 100%;
      height: 270px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }
    .category-badge {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .card-info {
      padding: 20px 20px 24px;
    }
    .card-info h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .price {
      font-size: 1.4rem;
      font-weight: 800;
      color: #2a9d8f;
      margin: 10px 0;
    }
    .quick-view {
      background: #fef3e8;
      border: none;
      font-weight: 600;
      padding: 10px 0;
      width: 100%;
      border-radius: 60px;
      margin-top: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .quick-view:hover {
      background: #e76f51;
      color: white;
    }
    footer {
      background: #1a1a24;
      color: #ccc;
      padding: 48px 0 32px;
      text-align: center;
      border-top-left-radius: 40px;
      border-top-right-radius: 40px;
      margin-top: 40px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-card {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 48px;
      padding: 32px;
      text-align: center;
      position: relative;
    }
    .close-modal {
      position: absolute;
      top: 18px;
      right: 22px;
      font-size: 1.8rem;
      background: none;
      border: none;
      cursor: pointer;
    }
    .modal-product-img {
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      border-radius: 28px;
      margin-bottom: 16px;
    }
    @media (max-width: 780px) {
      .container { padding: 0 20px; }
      .navbar { flex-direction: column; gap: 12px; }
      .page-header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <div class="navbar">
      <div class="logo"><i class="fas fa-store"></i> BAZAAR & CO.</div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="products.html" class="active"><i class="fas fa-grid-2"></i> All Products</a>
        <a href="tiktok-shop.html"><i class="fab fa-tiktok"></i> TikTok Shop</a>
        <a href="contact.html"><i class="fas fa-headset"></i> Contact</a>
      </div>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1><i class="fas fa-store"></i> Complete Collection</h1>
    <p>Home gadgets • Trendy clothes • Premium footwear — all prices in KES</p>
  </div>
</div>

<div class="container">
  <div class="filters-bar">
    <button class="filter-btn active" data-filter="all"><i class="fas fa-border-all"></i> All</button>
    <button class="filter-btn" data-filter="home gadget"><i class="fas fa-microchip"></i> Home Gadgets</button>
    <button class="filter-btn" data-filter="clothes"><i class="fas fa-tshirt"></i> Clothes</button>
    <button class="filter-btn" data-filter="shoes"><i class="fas fa-shoe-prints"></i> Footwear</button>
  </div>
  <div id="fullProductGrid" class="product-grid"></div>
</div>

<footer>
  <div class="container">
    <p><i class="fas fa-gem"></i> Bazaar & Co. — DM @BazaarAndCo_KE on TikTok to order</p>
    <p style="margin-top: 16px; font-size:0.8rem;">📍 Easy M-Pesa • Fast delivery across Kenya</p>
  </div>
</footer>

<div id="productModal" class="modal">
  <div class="modal-card">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <div id="modalProductImg" class="modal-product-img"></div>
    <h3 id="modalProductName" style="font-size:1.5rem; font-weight:800;"></h3>
    <p id="modalProductDesc" style="margin:12px 0; color:#4a4a5a;"></p>
    <div id="modalPrice" class="price"></div>
    <a href="https://www.tiktok.com/@BazaarAndCo_KE" target="_blank" id="modalTikTokLink" class="btn" style="background:#ff0050; margin-top:16px;"><i class="fab fa-tiktok"></i> Order on TikTok</a>
  </div>
</div>

<script>
  const productsCatalog = [
    { id: 1, name: "Smart RGB LED Strip", category: "home gadget", priceKes: 3200, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=🌈+LED+Strip", desc: "Music sync, 5m, app-controlled. Perfect for gaming or cozy nights." },
    { id: 2, name: "Mini Aroma Humidifier", category: "home gadget", priceKes: 4500, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=💨+Humidifier", desc: "300ml, silent mist, 7 color LEDs, auto shut-off." },
    { id: 3, name: "Oversized Knit Sweater", category: "clothes", priceKes: 3800, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=🧶+Knit+Sweater", desc: "Beige/cream, one size, cloud-soft fabric, viral TikTok style." },
    { id: 4, name: "High-Waist Cargo Pants", category: "clothes", priceKes: 4200, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=👖+Cargo+Pants", desc: "Khaki & black, relaxed fit, multiple pockets, streetwear essential." },
    { id: 5, name: "Chunky Platform Sneakers", category: "shoes", priceKes: 5900, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=👟+Chunky+Sneakers", desc: "Unisex, breathable, 4cm boost sole, white/cream, size 36-44." },
    { id: 6, name: "Leather Loafers (Slip-on)", category: "shoes", priceKes: 5400, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=👞+Leather+Loafers", desc: "Classic design, memory foam, everyday elegance & comfort." },
    { id: 7, name: "USB Mug Warmer", category: "home gadget", priceKes: 2200, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=☕+Mug+Warmer", desc: "Keep coffee/tea warm, 3 temp settings, auto-off." },
    { id: 8, name: "Oversized Graphic Hoodie", category: "clothes", priceKes: 4900, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=🦄+Graphic+Hoodie", desc: "Streetwear vibe, fleece lining, 'Bazaar Co.' print." },
    { id: 9, name: "Mesh Running Sneakers", category: "shoes", priceKes: 5200, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=🏃+Running+Shoes", desc: "Ultra-lightweight, non-slip, breathable mesh." },
    { id: 10, name: "Cordless Vacuum Cleaner", category: "home gadget", priceKes: 8900, image: "https://placehold.co/600x600/e9d6c5/a67c52?text=🧹+Vacuum", desc: "Powerful suction, lightweight, washable filter, cordless." }
  ];

  function formatKes(amount) {
    return 'KES ' + amount.toLocaleString('en-KE');
  }

  function getCategoryIcon(cat) {
    if (cat === 'home gadget') return '<i class="fas fa-microchip"></i> Home Gadget';
    if (cat === 'clothes') return '<i class="fas fa-tshirt"></i> Fashion';
    if (cat === 'shoes') return '<i class="fas fa-shoe-prints"></i> Footwear';
    return cat;
  }

  let currentFilter = 'all';

  function renderProducts() {
    const grid = document.getElementById('fullProductGrid');
    if (!grid) return;
    const filtered = currentFilter === 'all' ? productsCatalog : productsCatalog.filter(p => p.category === currentFilter);
    grid.innerHTML = '';
    filtered.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-id', prod.id);
      card.innerHTML = `
        <div class="card-img" style="background-image: url('${prod.image}');">
          <div class="category-badge">${getCategoryIcon(prod.category)}</div>
        </div>
        <div class="card-info">
          <h3>${prod.name}</h3>
          <div class="price">${formatKes(prod.priceKes)}</div>
          <p>${prod.desc.substring(0, 70)}${prod.desc.length > 70 ? '...' : ''}</p>
          <button class="quick-view" data-id="${prod.id}"><i class="fas fa-eye"></i> Quick view</button>
        </div>
      `;
      grid.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll('.quick-view').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        const product = productsCatalog.find(p => p.id === id);
        if (product) openModal(product);
      });
    });
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('quick-view')) return;
        const id = parseInt(card.dataset.id);
        const product = productsCatalog.find(p => p.id === id);
        if (product) openModal(product);
      });
    });
  }

  const modal = document.getElementById('productModal');
  const modalImg = document.getElementById('modalProductImg');
  const modalName = document.getElementById('modalProductName');
  const modalDesc = document.getElementById('modalProductDesc');
  const modalPrice = document.getElementById('modalPrice');
  const modalLink = document.getElementById('modalTikTokLink');

  function openModal(prod) {
    modalImg.style.backgroundImage = `url('${prod.image}')`;
    modalName.innerText = prod.name;
    modalDesc.innerText = prod.desc;
    modalPrice.innerText = formatKes(prod.priceKes);
    modalLink.href = 'https://www.tiktok.com/@BazaarAndCo_KE';
    modal.style.display = 'flex';
  }

  document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderProducts();
    });
  });

  renderProducts();
</script>
</body>
</html>
